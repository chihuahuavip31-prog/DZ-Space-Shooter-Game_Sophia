<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DZ Space Shooter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  canvas { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// =============================================================================
// DZ SPACE SHOOTER — Mobile-enhanced (invisible touch controls)
// Controls:
//   Mobile: Touch anywhere and drag to move the ship (ship follows your finger
//           with a smooth offset). Tap without moving to shoot. Multi-touch
//           auto-shoots while you steer.
//   Desktop: WASD/Arrows + Space/Click (unchanged)
// =============================================================================

// ─── POLYFILL: roundRect ─────────────────────────────────────────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    r = Math.min(r, Math.min(w, h) / 2);
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
  };
}

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const PLAYER_WIDTH = 48, PLAYER_HEIGHT = 52, PLAYER_BASE_SPEED = 5;
const PLAYER_SHOOT_COOLDOWN = 12, PLAYER_MAX_HP = 100, PLAYER_MAX_SHIELD = 60;
const PLAYER_INVINCIBLE_FRAMES = 90, PLAYER_BULLET_SPEED = 14, ENEMY_BULLET_SPEED = 5;
const POWERUP_SIZE = 28, POWERUP_SPEED = 2, POWERUP_DURATION_FRAMES = 600;
const COMBO_TIMEOUT_FRAMES = 180;
const LS_KEY = "sophiaCosmicConquest_highScores";

// Touch movement constants
const TOUCH_MOVE_THRESHOLD = 6;   // pixels before we consider it a drag vs tap
const TOUCH_SHIP_SPEED = 7;       // how fast ship lerps to target on mobile

const COLORS = {
  playerThruster:"#f59e0b", playerBullet:"#60a5fa", playerBulletGlow:"#93c5fd",
  enemyDrone:"#ef4444", enemyDroneGlow:"#fca5a5",
  enemyZigzag:"#f97316", enemyZigzagGlow:"#fdba74",
  enemyCircle:"#eab308", enemyCircleGlow:"#fde047",
  enemyTank:"#16a34a", enemyTankGlow:"#4ade80",
  enemySniper:"#db2777", enemySniperGlow:"#f9a8d4",
  enemySplitter:"#7c3aed", enemySplitterGlow:"#c4b5fd",
  enemyBullet:"#ef4444", enemyBulletGlow:"#fca5a5",
  boss1:"#dc2626", boss1Glow:"#ef4444",
  boss2:"#7c3aed", boss2Glow:"#a78bfa",
  boss3:"#0ea5e9", boss3Glow:"#38bdf8",
  starColors:["#fff","#e9d5ff","#bfdbfe","#fde68a","#fecaca"],
};

const SCORE_VALUES = {
  drone:100, zigzag:150, circle:200, tank:300, sniper:250,
  splitter:350, minion:80, boss1:5000, boss2:7500, boss3:12000,
};

const WAVES = [
  { label:"Wave 1 — Drone Patrol",        isBossWave:false, enemyGroups:[{type:"drone",   count:6, spawnDelay:40}] },
  { label:"Wave 2 — Evasion Protocol",    isBossWave:false, enemyGroups:[{type:"drone",   count:5, spawnDelay:30},{type:"zigzag",  count:4, spawnDelay:45}] },
  { label:"Wave 3 — Circle Formation",    isBossWave:false, enemyGroups:[{type:"drone",   count:4, spawnDelay:25},{type:"circle",  count:4, spawnDelay:50},{type:"zigzag",count:3,spawnDelay:35}] },
  { label:"BOSS WAVE — Warlord Zython",   isBossWave:true,  enemyGroups:[{type:"boss1",   count:1, spawnDelay:0}] },
  { label:"Wave 5 — Heavy Artillery",     isBossWave:false, enemyGroups:[{type:"tank",    count:4, spawnDelay:60},{type:"sniper",  count:4, spawnDelay:45},{type:"zigzag",count:5,spawnDelay:30}] },
  { label:"Wave 6 — Cell Division",       isBossWave:false, enemyGroups:[{type:"splitter",count:5, spawnDelay:55},{type:"circle",  count:5, spawnDelay:40},{type:"sniper",count:3,spawnDelay:50}] },
  { label:"Wave 7 — The Swarm",           isBossWave:false, enemyGroups:[{type:"drone",   count:8, spawnDelay:20},{type:"zigzag",  count:6, spawnDelay:25},{type:"tank",count:3,spawnDelay:70},{type:"sniper",count:4,spawnDelay:45}] },
  { label:"BOSS WAVE — Empress Vexara",   isBossWave:true,  enemyGroups:[{type:"boss2",   count:1, spawnDelay:0}] },
  { label:"Wave 9 — Elite Squadron",      isBossWave:false, enemyGroups:[{type:"splitter",count:6, spawnDelay:40},{type:"tank",    count:5, spawnDelay:55},{type:"sniper",count:6,spawnDelay:35},{type:"circle",count:4,spawnDelay:45}] },
  { label:"FINAL BOSS — The Cosmic Devourer", isBossWave:true, enemyGroups:[{type:"boss3",count:1, spawnDelay:0}] },
];

// ─── GLOBAL STATE ─────────────────────────────────────────────────────────────
let globalId = 0;
const nextId = () => ++globalId;
let spawnQueue = [], waveStartFrame = 0;
let state, input, animFrame;

// ─── TOUCH STATE ─────────────────────────────────────────────────────────────
// We track the primary steering touch and auto-shoot while touching
const touch = {
  active: false,
  id: null,
  startX: 0, startY: 0,
  currentX: 0, currentY: 0,
  // Target position for the ship (absolute canvas coords of ship center)
  targetX: 0, targetY: 0,
  isDrag: false,       // true once moved beyond threshold
  shootPending: false, // tap (no drag) → single shoot trigger
  multiTouch: false,   // second finger held = continuous shoot
};

// ─── INPUT ────────────────────────────────────────────────────────────────────
function createInput() {
  return { left:false, right:false, up:false, down:false, shoot:false, pause:false,
           mouseX:0, mouseY:0, mouseShoot:false,
           // Touch-driven movement deltas (set each frame)
           touchMoveX:0, touchMoveY:0, touchActive:false };
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
function createPlayer(w, h) {
  return {
    id:0, x:w/2-PLAYER_WIDTH/2, y:h-120, width:PLAYER_WIDTH, height:PLAYER_HEIGHT, active:true,
    speed:PLAYER_BASE_SPEED, hp:PLAYER_MAX_HP, maxHp:PLAYER_MAX_HP, shield:0, maxShield:PLAYER_MAX_SHIELD,
    shootCooldown:PLAYER_SHOOT_COOLDOWN, shootTimer:0, invincibleTimer:0, thrusterParticleTimer:0,
    spreadShot:false, spreadShotTimer:0, laserBeam:false, laserBeamTimer:0,
    rapidFire:false, rapidFireTimer:0, magnetRange:0, magnetTimer:0,
  };
}

function generateStars(w, h, count) {
  const stars = [];
  for (let i = 0; i < count; i++) {
    const layer = Math.random();
    stars.push({
      x: Math.random()*w, y: Math.random()*h,
      speed: 0.3+(1-layer)*2.2, size: 0.4+(1-layer)*2.5,
      opacity: 0.3+(1-layer)*0.7,
      color: COLORS.starColors[Math.floor(Math.random()*COLORS.starColors.length)],
      twinkleOffset: Math.random()*Math.PI*2,
    });
  }
  return stars;
}

function loadHighScores() {
  try { const r=localStorage.getItem(LS_KEY); return r?JSON.parse(r):[]; } catch { return []; }
}

function saveHighScore(st) {
  const entry = { name:"Player", score:st.score, wave:st.wave, date:new Date().toLocaleDateString() };
  const scores = [...st.highScores, entry].sort((a,b)=>b.score-a.score).slice(0,10);
  st.highScores = scores;
  try { localStorage.setItem(LS_KEY, JSON.stringify(scores)); } catch {}
}

function createInitialState(w, h) {
  return {
    phase:"menu", score:0, combo:0, maxCombo:0, comboTimer:0,
    wave:0, totalWaves:WAVES.length, enemiesRemaining:0,
    player:createPlayer(w,h), enemies:[], playerBullets:[], enemyBullets:[],
    particles:[], powerUps:[], stars:generateStars(w,h,180),
    bossActive:false, bossWarningTimer:0, screenShake:0, frameCount:0,
    highScores:loadHighScores(), canvasWidth:w, canvasHeight:h,
  };
}

// ─── WAVE MANAGEMENT ──────────────────────────────────────────────────────────
function startNextWave(st) {
  const idx = st.wave;
  if (idx >= WAVES.length) { st.phase="victory"; return; }
  const cfg = WAVES[idx];
  st.bossActive = cfg.isBossWave;
  st.bossWarningTimer = cfg.isBossWave ? 180 : 0;
  spawnQueue = [];
  let frame = cfg.isBossWave ? 200 : 0;
  for (const g of cfg.enemyGroups) {
    for (let i=0;i<g.count;i++) { spawnQueue.push({type:g.type, frameDelay:frame}); frame+=g.spawnDelay; }
  }
  st.enemiesRemaining = cfg.enemyGroups.reduce((s,g)=>s+g.count,0);
  waveStartFrame = st.frameCount;
  st.phase = "playing";
}

function processSpawnQueue(st) {
  const elapsed = st.frameCount - waveStartFrame;
  const toSpawn = spawnQueue.filter(e=>e.frameDelay<=elapsed);
  spawnQueue = spawnQueue.filter(e=>e.frameDelay>elapsed);
  for (const e of toSpawn) spawnEnemy(st, e.type);
}

// ─── ENEMY FACTORIES ──────────────────────────────────────────────────────────
function scaledHp(base, wave) { return Math.floor(base*(1+(wave-1)*0.2)); }

function baseEnemy(overrides) {
  return Object.assign({
    id:0, active:true, moveAngle:0, moveTime:0, phase:0,
    orbitAngle:0, orbitRadius:0, orbitCenterX:0, orbitCenterY:0, flashTimer:0,
  }, overrides);
}

function spawnEnemy(st, type) {
  const w=st.canvasWidth, h=st.canvasHeight, wave=st.wave;
  let e;
  switch(type) {
    case "drone":
      e=baseEnemy({type:"drone",x:40+Math.random()*(w-80),y:-40,width:36,height:36,
        hp:scaledHp(20,wave),maxHp:scaledHp(20,wave),speed:1.8+wave*0.15,
        shootTimer:60+Math.random()*120,shootCooldown:90,
        scoreValue:SCORE_VALUES.drone,color:COLORS.enemyDrone,glowColor:COLORS.enemyDroneGlow,size:1});
      break;
    case "zigzag":
      e=baseEnemy({type:"zigzag",x:40+Math.random()*(w-80),y:-40,width:32,height:32,
        hp:scaledHp(15,wave),maxHp:scaledHp(15,wave),speed:2.2+wave*0.12,
        shootTimer:80+Math.random()*100,shootCooldown:100,
        scoreValue:SCORE_VALUES.zigzag,color:COLORS.enemyZigzag,glowColor:COLORS.enemyZigzagGlow,size:0.9});
      break;
    case "circle": {
      const cx=80+Math.random()*(w-160), cy=80+Math.random()*180;
      const ang=Math.random()*Math.PI*2, rad=60+Math.random()*50;
      e=baseEnemy({type:"circle",x:cx+Math.cos(ang)*rad,y:cy+Math.sin(ang)*rad,width:34,height:34,
        hp:scaledHp(18,wave),maxHp:scaledHp(18,wave),speed:0.035+wave*0.003,
        shootTimer:70+Math.random()*100,shootCooldown:95,orbitAngle:ang,orbitRadius:rad,orbitCenterX:cx,orbitCenterY:cy,
        scoreValue:SCORE_VALUES.circle,color:COLORS.enemyCircle,glowColor:COLORS.enemyCircleGlow,size:0.95});
      break;
    }
    case "tank":
      e=baseEnemy({type:"tank",x:60+Math.random()*(w-120),y:-60,width:52,height:52,
        hp:scaledHp(80,wave),maxHp:scaledHp(80,wave),speed:0.7+wave*0.05,
        shootTimer:40+Math.random()*60,shootCooldown:60,
        scoreValue:SCORE_VALUES.tank,color:COLORS.enemyTank,glowColor:COLORS.enemyTankGlow,size:1.4});
      break;
    case "sniper":
      e=baseEnemy({type:"sniper",x:60+Math.random()*(w-120),y:-40,width:28,height:40,
        hp:scaledHp(12,wave),maxHp:scaledHp(12,wave),speed:1.0+wave*0.08,
        shootTimer:120+Math.random()*60,shootCooldown:150,
        scoreValue:SCORE_VALUES.sniper,color:COLORS.enemySniper,glowColor:COLORS.enemySniperGlow,size:0.8});
      break;
    case "splitter":
      e=baseEnemy({type:"splitter",x:80+Math.random()*(w-160),y:-50,width:44,height:44,
        hp:scaledHp(40,wave),maxHp:scaledHp(40,wave),speed:1.3+wave*0.1,
        shootTimer:80+Math.random()*80,shootCooldown:110,
        scoreValue:SCORE_VALUES.splitter,color:COLORS.enemySplitter,glowColor:COLORS.enemySplitterGlow,size:1.2});
      break;
    case "minion":
      e=baseEnemy({type:"minion",x:60+Math.random()*(w-120),y:100+Math.random()*200,width:20,height:20,
        hp:8,maxHp:8,speed:2.5,shootTimer:60+Math.random()*60,shootCooldown:90,
        scoreValue:SCORE_VALUES.minion,color:COLORS.enemyDrone,glowColor:COLORS.enemyDroneGlow,size:0.6});
      break;
    case "boss1":
      e=baseEnemy({type:"boss1",x:w/2-60,y:-120,width:120,height:90,
        hp:800,maxHp:800,speed:1.5,shootTimer:60,shootCooldown:60,orbitCenterX:w/2,orbitCenterY:150,
        scoreValue:SCORE_VALUES.boss1,color:COLORS.boss1,glowColor:COLORS.boss1Glow,size:2.2});
      break;
    case "boss2":
      e=baseEnemy({type:"boss2",x:w/2-70,y:-140,width:140,height:100,
        hp:1200,maxHp:1200,speed:1.2,shootTimer:80,shootCooldown:80,orbitCenterX:w/2,orbitCenterY:160,
        scoreValue:SCORE_VALUES.boss2,color:COLORS.boss2,glowColor:COLORS.boss2Glow,size:2.6});
      break;
    case "boss3":
      e=baseEnemy({type:"boss3",x:w/2-80,y:-160,width:160,height:120,
        hp:2000,maxHp:2000,speed:1.0,shootTimer:50,shootCooldown:50,orbitCenterX:w/2,orbitCenterY:170,
        scoreValue:SCORE_VALUES.boss3,color:COLORS.boss3,glowColor:COLORS.boss3Glow,size:3.0});
      break;
    default:
      e=baseEnemy({type:"drone",x:40+Math.random()*(w-80),y:-40,width:36,height:36,
        hp:20,maxHp:20,speed:2,shootTimer:90,shootCooldown:90,
        scoreValue:100,color:COLORS.enemyDrone,glowColor:COLORS.enemyDroneGlow,size:1});
  }
  e.id = nextId();
  st.enemies.push(e);
}

// ─── BULLETS ──────────────────────────────────────────────────────────────────
function firePlayerBullet(st) {
  const p=st.player, cx=p.x+p.width/2, cy=p.y;
  if (p.spreadShot) {
    for (const deg of [-30,-15,0,15,30]) {
      const rad=deg*Math.PI/180;
      st.playerBullets.push({id:nextId(),active:true,x:cx-3,y:cy-8,width:6,height:6,
        vx:Math.sin(rad)*PLAYER_BULLET_SPEED,vy:-Math.cos(rad)*PLAYER_BULLET_SPEED,
        damage:12,color:"#a78bfa",glowColor:"#c4b5fd",size:4});
    }
  } else if (p.rapidFire) {
    for (const xOff of [-12,12]) {
      st.playerBullets.push({id:nextId(),active:true,x:cx+xOff-3,y:cy-8,width:5,height:5,
        vx:0,vy:-PLAYER_BULLET_SPEED*1.5,damage:8,color:"#f59e0b",glowColor:"#fcd34d",size:3});
    }
  } else {
    st.playerBullets.push({id:nextId(),active:true,x:cx-3,y:cy-8,width:6,height:6,
      vx:0,vy:-PLAYER_BULLET_SPEED,damage:15,color:COLORS.playerBullet,glowColor:COLORS.playerBulletGlow,size:5});
  }
}

function fireEnemyBullet(st, enemy) {
  const cx=enemy.x+enemy.width/2, cy=enemy.y+enemy.height, p=st.player;
  if (enemy.type==="sniper") {
    const px=p.x+p.width/2, py=p.y+p.height/2;
    const dist=Math.hypot(px-cx,py-cy)||1;
    st.enemyBullets.push({id:nextId(),active:true,x:cx-3.5,y:cy,width:7,height:7,
      vx:(px-cx)/dist*ENEMY_BULLET_SPEED*1.6, vy:(py-cy)/dist*ENEMY_BULLET_SPEED*1.6,
      damage:18,color:COLORS.enemySniper,glowColor:COLORS.enemySniperGlow,size:7});
    return;
  }
  if (enemy.type==="boss1") {
    for (let i=0;i<8;i++) {
      const a=(i/8)*Math.PI*2+st.frameCount*0.05;
      st.enemyBullets.push({id:nextId(),active:true,x:cx-4,y:cy-4,width:8,height:8,
        vx:Math.cos(a)*ENEMY_BULLET_SPEED, vy:Math.sin(a)*ENEMY_BULLET_SPEED,
        damage:12,color:COLORS.boss1,glowColor:COLORS.boss1Glow,size:6});
    } return;
  }
  if (enemy.type==="boss2") {
    for (const deg of [-20,0,20]) {
      const r=deg*Math.PI/180;
      st.enemyBullets.push({id:nextId(),active:true,x:cx-4,y:cy,width:8,height:8,
        vx:Math.sin(r)*ENEMY_BULLET_SPEED*1.2, vy:Math.cos(r)*ENEMY_BULLET_SPEED*1.2,
        damage:15,color:COLORS.boss2,glowColor:COLORS.boss2Glow,size:8});
    } return;
  }
  if (enemy.type==="boss3") {
    if (enemy.phase===0) {
      for (let i=0;i<12;i++) {
        const a=(i/12)*Math.PI*2+st.frameCount*0.08;
        st.enemyBullets.push({id:nextId(),active:true,x:cx-4,y:cy-4,width:8,height:8,
          vx:Math.cos(a)*ENEMY_BULLET_SPEED, vy:Math.sin(a)*ENEMY_BULLET_SPEED,
          damage:14,color:COLORS.boss3,glowColor:COLORS.boss3Glow,size:7});
      }
    } else if (enemy.phase===1) {
      const px=p.x+p.width/2, py=p.y+p.height/2;
      const dist=Math.hypot(px-cx,py-cy)||1;
      const bvx=(px-cx)/dist*ENEMY_BULLET_SPEED*1.4, bvy=(py-cy)/dist*ENEMY_BULLET_SPEED*1.4;
      for (let i=-2;i<=2;i++) {
        st.enemyBullets.push({id:nextId(),active:true,x:cx-4+i*10,y:cy,width:8,height:8,
          vx:bvx+i*0.5,vy:bvy,damage:18,color:"#f59e0b",glowColor:"#fcd34d",size:8});
      }
    } else {
      for (let i=0;i<20;i++) {
        const a=(i/20)*Math.PI*2;
        st.enemyBullets.push({id:nextId(),active:true,x:cx-4,y:cy-4,width:8,height:8,
          vx:Math.cos(a)*ENEMY_BULLET_SPEED*1.3, vy:Math.sin(a)*ENEMY_BULLET_SPEED*1.3,
          damage:20,color:"#ef4444",glowColor:"#fca5a5",size:9});
      }
    } return;
  }
  st.enemyBullets.push({id:nextId(),active:true,x:cx-2.5,y:cy,width:5,height:5,
    vx:0,vy:ENEMY_BULLET_SPEED,damage:10,color:COLORS.enemyBullet,glowColor:COLORS.enemyBulletGlow,size:5});
}

// ─── PARTICLES ────────────────────────────────────────────────────────────────
function spawnExplosion(st, x, y, color, count, bigness=1) {
  for (let i=0;i<count;i++) {
    const a=Math.random()*Math.PI*2, speed=(1.5+Math.random()*4)*bigness;
    st.particles.push({id:nextId(),active:true,x,y,width:4,height:4,
      vx:Math.cos(a)*speed,vy:Math.sin(a)*speed,life:1,decay:0.015+Math.random()*0.025,
      color,size:(2+Math.random()*4)*bigness,type:"explosion",
      rotation:Math.random()*Math.PI*2,rotationSpeed:(Math.random()-0.5)*0.2});
  }
  for (let i=0;i<Math.floor(count/3);i++) {
    const a=Math.random()*Math.PI*2, speed=3+Math.random()*6;
    st.particles.push({id:nextId(),active:true,x,y,width:2,height:2,
      vx:Math.cos(a)*speed*bigness,vy:Math.sin(a)*speed*bigness,
      life:1,decay:0.03+Math.random()*0.04,color:"#ffffff",size:1.5,type:"spark"});
  }
}

function spawnThrusterParticles(st) {
  const p=st.player, cx=p.x+p.width/2, ty=p.y+p.height;
  for (let i=0;i<3;i++) {
    st.particles.push({id:nextId(),active:true,
      x:cx+(Math.random()-0.5)*12,y:ty,width:4,height:4,
      vx:(Math.random()-0.5)*1.5,vy:2+Math.random()*3,
      life:1,decay:0.06+Math.random()*0.06,
      color:Math.random()>0.5?COLORS.playerThruster:"#fde68a",
      size:3+Math.random()*3,type:"thruster"});
  }
}

function spawnScoreParticle(st, x, y, points) {
  st.particles.push({id:nextId(),active:true,x,y,width:0,height:0,
    vx:0,vy:-1.2,life:1,decay:0.012,color:"#fde68a",size:14,type:"score",text:`+${points.toLocaleString()}`});
}

function spawnPickupParticles(st, x, y, color) {
  for (let i=0;i<15;i++) {
    const a=Math.random()*Math.PI*2, speed=1+Math.random()*3;
    st.particles.push({id:nextId(),active:true,x,y,width:4,height:4,
      vx:Math.cos(a)*speed,vy:Math.sin(a)*speed,
      life:1,decay:0.03,color,size:4+Math.random()*3,type:"pickup"});
  }
}

// ─── POWER-UPS ────────────────────────────────────────────────────────────────
function dropPowerUp(st, enemy) {
  const chances={drone:0.08,zigzag:0.10,circle:0.12,tank:0.25,sniper:0.20,splitter:0.18,minion:0.04,boss1:1.0,boss2:1.0,boss3:1.0};
  if (Math.random()>(chances[enemy.type]??0.05)) return;
  const types=["health","shield","spreadShot","rapidFire","laserBeam","magnet","bomb"];
  const weights=[3,2,2,2,1,2,1];
  let rand=Math.random()*weights.reduce((a,b)=>a+b,0), chosen="health";
  for (let i=0;i<types.length;i++) { rand-=weights[i]; if(rand<=0){chosen=types[i];break;} }
  const colorMap={health:["#22c55e","#4ade80"],shield:["#3b82f6","#60a5fa"],spreadShot:["#a78bfa","#c4b5fd"],
    rapidFire:["#f59e0b","#fcd34d"],laserBeam:["#ef4444","#fca5a5"],magnet:["#06b6d4","#67e8f9"],bomb:["#f97316","#fdba74"]};
  const labelMap={health:"HP",shield:"SHD",spreadShot:"SPR",rapidFire:"RFR",laserBeam:"LSR",magnet:"MGT",bomb:"BMB"};
  const [col,glow]=colorMap[chosen];
  st.powerUps.push({id:nextId(),active:true,
    x:enemy.x+enemy.width/2-POWERUP_SIZE/2, y:enemy.y+enemy.height/2-POWERUP_SIZE/2,
    width:POWERUP_SIZE,height:POWERUP_SIZE,type:chosen,
    vx:(Math.random()-0.5)*1.5,vy:POWERUP_SPEED,animTimer:0,color:col,glowColor:glow,label:labelMap[chosen]});
}

function applyPowerUp(st, pu) {
  const p=st.player;
  switch(pu.type) {
    case "health":     p.hp=Math.min(p.maxHp,p.hp+40); break;
    case "shield":     p.shield=Math.min(p.maxShield,p.shield+60); break;
    case "spreadShot": p.spreadShot=true; p.spreadShotTimer=POWERUP_DURATION_FRAMES; break;
    case "rapidFire":  p.rapidFire=true; p.rapidFireTimer=POWERUP_DURATION_FRAMES; break;
    case "laserBeam":  p.laserBeam=true; p.laserBeamTimer=POWERUP_DURATION_FRAMES; break;
    case "magnet":     p.magnetRange=200; p.magnetTimer=POWERUP_DURATION_FRAMES; break;
    case "bomb":
      for (const e of st.enemies) {
        if (!e.active) continue;
        e.hp-=80; e.flashTimer=10;
        spawnExplosion(st,e.x+e.width/2,e.y+e.height/2,e.glowColor,12,0.8);
      }
      st.screenShake=25;
      spawnExplosion(st,st.canvasWidth/2,st.canvasHeight/2,"#ffffff",60,3);
      break;
  }
  spawnPickupParticles(st,pu.x+pu.width/2,pu.y+pu.height/2,pu.glowColor);
}

// ─── COLLISION ────────────────────────────────────────────────────────────────
function rectsOverlap(ax,ay,aw,ah,bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

function addScore(st, base, x, y) {
  st.combo++;
  st.comboTimer=COMBO_TIMEOUT_FRAMES;
  if (st.combo>st.maxCombo) st.maxCombo=st.combo;
  const multiplier=1+Math.floor(st.combo/5)*0.5;
  const total=Math.round(base*multiplier);
  st.score+=total;
  spawnScoreParticle(st,x,y,total);
}

function damagePlayer(st, amount) {
  const p=st.player;
  if (p.shield>0) {
    const absorbed=Math.min(p.shield,amount);
    p.shield-=absorbed; amount-=absorbed;
    spawnExplosion(st,p.x+p.width/2,p.y+p.height/2,"#60a5fa",10,0.7);
  }
  if (amount>0) {
    p.hp-=amount; p.invincibleTimer=PLAYER_INVINCIBLE_FRAMES;
    st.screenShake=12;
    spawnExplosion(st,p.x+p.width/2,p.y+p.height/2,"#a78bfa",16,1.1);
  }
}

function onEnemyKilled(st, enemy) {
  const cx=enemy.x+enemy.width/2, cy=enemy.y+enemy.height/2;
  const isBoss=["boss1","boss2","boss3"].includes(enemy.type);
  spawnExplosion(st,cx,cy,enemy.glowColor,isBoss?80:20,isBoss?4:1.5);
  if (isBoss) st.screenShake=60;
  addScore(st,enemy.scoreValue,cx,cy);
  st.enemiesRemaining=Math.max(0,st.enemiesRemaining-1);
  if (enemy.type==="splitter") {
    for (let i=0;i<2;i++) {
      spawnEnemy(st,"minion");
      st.enemies[st.enemies.length-1].x=cx+(i===0?-24:24);
      st.enemies[st.enemies.length-1].y=cy;
      st.enemiesRemaining+=1;
    }
  }
  dropPowerUp(st,enemy);
}

function checkCollisions(st) {
  const p=st.player;
  for (const bullet of st.playerBullets) {
    if (!bullet.active) continue;
    for (const enemy of st.enemies) {
      if (!enemy.active) continue;
      if (rectsOverlap(bullet.x,bullet.y,bullet.width,bullet.height,enemy.x,enemy.y,enemy.width,enemy.height)) {
        bullet.active=false; enemy.hp-=bullet.damage; enemy.flashTimer=8;
        spawnExplosion(st,bullet.x+bullet.width/2,bullet.y,bullet.glowColor,5,0.5);
        if (enemy.hp<=0) { enemy.active=false; onEnemyKilled(st,enemy); }
        break;
      }
    }
  }
  if (p.invincibleTimer<=0) {
    for (const bullet of st.enemyBullets) {
      if (!bullet.active) continue;
      if (rectsOverlap(bullet.x,bullet.y,bullet.width,bullet.height,p.x+6,p.y+8,p.width-12,p.height-12)) {
        bullet.active=false; damagePlayer(st,bullet.damage);
        spawnExplosion(st,bullet.x,bullet.y,"#ef4444",8,0.6);
      }
    }
    for (const enemy of st.enemies) {
      if (!enemy.active) continue;
      if (rectsOverlap(p.x+4,p.y+6,p.width-8,p.height-10,enemy.x,enemy.y,enemy.width,enemy.height)) {
        damagePlayer(st,25); enemy.hp-=30; enemy.flashTimer=10;
        if (enemy.hp<=0) { enemy.active=false; onEnemyKilled(st,enemy); }
      }
    }
  }
  for (const pu of st.powerUps) {
    if (!pu.active) continue;
    if (rectsOverlap(p.x,p.y,p.width,p.height,pu.x,pu.y,pu.width,pu.height)) {
      pu.active=false; applyPowerUp(st,pu);
    }
  }
}

// ─── LASER ────────────────────────────────────────────────────────────────────
function applyLaserDamage(st) {
  const p=st.player, lx=p.x+p.width/2, ly=p.y;
  for (const enemy of st.enemies) {
    if (!enemy.active) continue;
    if (enemy.x<lx+12 && enemy.x+enemy.width>lx-12 && enemy.y<ly) {
      if (st.frameCount%3===0) {
        enemy.hp-=4; enemy.flashTimer=3;
        spawnExplosion(st,lx,enemy.y+enemy.height/2,"#ef4444",3,0.3);
        if (enemy.hp<=0) { enemy.active=false; onEnemyKilled(st,enemy); }
      }
    }
  }
}

// ─── ENEMY UPDATES ────────────────────────────────────────────────────────────
function updateEnemy(st, enemy) {
  const w=st.canvasWidth, h=st.canvasHeight;
  if (enemy.flashTimer>0) enemy.flashTimer--;
  switch(enemy.type) {
    case "drone":    enemy.y+=enemy.speed; if(enemy.y>h+80) enemy.active=false; break;
    case "zigzag":   enemy.moveTime++; enemy.y+=enemy.speed*0.8; enemy.x+=Math.sin(enemy.moveTime*0.08)*3.5;
                     enemy.x=Math.max(10,Math.min(w-enemy.width-10,enemy.x)); if(enemy.y>h+80) enemy.active=false; break;
    case "circle":   enemy.orbitAngle+=enemy.speed; enemy.orbitCenterY+=0.2;
                     enemy.x=enemy.orbitCenterX+Math.cos(enemy.orbitAngle)*enemy.orbitRadius-enemy.width/2;
                     enemy.y=enemy.orbitCenterY+Math.sin(enemy.orbitAngle)*enemy.orbitRadius-enemy.height/2;
                     if(enemy.orbitCenterY>h+100) enemy.active=false; break;
    case "tank":     enemy.y+=enemy.speed; enemy.x+=Math.sin(enemy.moveTime*0.03)*1.5; enemy.moveTime++;
                     if(enemy.y>h+100) enemy.active=false; break;
    case "sniper":   if(enemy.y<120){enemy.y+=enemy.speed*1.5;}else{enemy.x+=Math.sin(enemy.moveTime*0.04)*1.2;}
                     enemy.moveTime++; if(enemy.y>h+80) enemy.active=false; break;
    case "splitter": enemy.y+=enemy.speed; if(enemy.y>h+80) enemy.active=false; break;
    case "minion":   enemy.y+=enemy.speed; enemy.x+=Math.sin(enemy.moveTime*0.1)*2; enemy.moveTime++;
                     if(enemy.y>h+60) enemy.active=false; break;
    case "boss1":    updateBoss1(st,enemy); break;
    case "boss2":    updateBoss2(st,enemy); break;
    case "boss3":    updateBoss3(st,enemy); break;
  }
  if (!["boss1","boss2","boss3"].includes(enemy.type)) {
    enemy.shootTimer--;
    if (enemy.shootTimer<=0) { fireEnemyBullet(st,enemy); enemy.shootTimer=enemy.shootCooldown; }
  }
}

function updateBoss1(st, e) {
  const w=st.canvasWidth;
  if (e.y<60){e.y+=1.5;}else{e.moveTime++;e.x=w/2-e.width/2+Math.sin(e.moveTime*0.01)*(w/3-60);}
  const r=e.hp/e.maxHp; e.phase=r>0.66?0:r>0.33?1:2;
  const cd=70-e.phase*15; e.shootTimer--;
  if (e.shootTimer<=0) {
    fireEnemyBullet(st,e);
    if (e.phase>=1&&Math.random()<0.3) spawnEnemy(st,"minion");
    e.shootTimer=cd;
  }
}

function updateBoss2(st, e) {
  const w=st.canvasWidth;
  if (e.y<70){e.y+=1.2;}else{e.moveTime++;e.x=w/2-e.width/2+Math.sin(e.moveTime*0.008)*(w/2.5-70);e.y=70+Math.cos(e.moveTime*0.006)*30;}
  const r=e.hp/e.maxHp; e.phase=r>0.5?0:1;
  const cd=90-e.phase*20; e.shootTimer--;
  if (e.shootTimer<=0) {
    fireEnemyBullet(st,e);
    if (e.phase>=1&&st.frameCount%90===0){spawnEnemy(st,"minion");spawnEnemy(st,"minion");}
    e.shootTimer=cd;
  }
}

function updateBoss3(st, e) {
  const w=st.canvasWidth;
  if (e.y<80){e.y+=1.0;}else{e.moveTime++;e.x=w/2-e.width/2+Math.sin(e.moveTime*0.012)*(w/2.8-80);e.y=80+Math.sin(e.moveTime*0.006)*50;}
  const r=e.hp/e.maxHp; e.phase=r>0.66?0:r>0.33?1:2;
  if (e.phase===1){e.color=COLORS.boss2;e.glowColor=COLORS.boss2Glow;}
  else if (e.phase===2){e.color="#ef4444";e.glowColor="#fca5a5";}
  const cd=55-e.phase*8; e.shootTimer--;
  if (e.shootTimer<=0) {
    fireEnemyBullet(st,e);
    if (st.frameCount%60===0){for(let i=0;i<=e.phase;i++) spawnEnemy(st,"minion");}
    e.shootTimer=cd;
  }
}

// ─── PLAYER UPDATE ────────────────────────────────────────────────────────────
function updatePlayer(st, inp) {
  const p=st.player, w=st.canvasWidth, h=st.canvasHeight;

  // ── Keyboard movement (unchanged) ──
  if (inp.left)  p.x-=p.speed;
  if (inp.right) p.x+=p.speed;
  if (inp.up)    p.y-=p.speed;
  if (inp.down)  p.y+=p.speed;

  // ── Touch / drag movement ──
  // If touch is active and has been dragged, move ship toward the touch target
  // using smooth lerp so movement feels fluid, never teleports
  if (touch.active && touch.isDrag) {
    const lerpFactor = 0.18; // 0=no movement, 1=instant snap — 0.18 = smooth
    const targetPx = touch.targetX - p.width / 2;
    const targetPy = touch.targetY - p.height / 2;
    p.x += (targetPx - p.x) * lerpFactor;
    p.y += (targetPy - p.y) * lerpFactor;
  }

  p.x=Math.max(4,Math.min(w-p.width-4,p.x));
  p.y=Math.max(4,Math.min(h-p.height-4,p.y));

  if (p.shootTimer>0) p.shootTimer--;
  const cd=p.rapidFire?Math.floor(p.shootCooldown*0.35):p.shootCooldown;

  // Shoot conditions: keyboard space/mouse, touch tap (single shot), or multi-touch hold (continuous)
  const wantShoot = inp.shoot || inp.mouseShoot || touch.multiTouch
    || (touch.active && touch.isDrag); // auto-shoot while steering

  if (wantShoot && p.shootTimer<=0) {
    firePlayerBullet(st);
    p.shootTimer=cd;
  }
  // Tap without drag = single shot
  if (touch.shootPending) {
    if (p.shootTimer<=0) { firePlayerBullet(st); p.shootTimer=cd; }
    touch.shootPending=false;
  }

  if (p.spreadShotTimer>0){p.spreadShotTimer--;if(p.spreadShotTimer<=0)p.spreadShot=false;}
  if (p.rapidFireTimer>0){p.rapidFireTimer--;if(p.rapidFireTimer<=0)p.rapidFire=false;}
  if (p.laserBeamTimer>0){p.laserBeamTimer--;if(p.laserBeamTimer<=0)p.laserBeam=false;}
  if (p.magnetTimer>0){p.magnetTimer--;if(p.magnetTimer<=0)p.magnetRange=0;}
  if (p.invincibleTimer>0) p.invincibleTimer--;
  if (p.magnetRange>0) {
    const px=p.x+p.width/2, py=p.y+p.height/2;
    for (const pu of st.powerUps) {
      const dist=Math.hypot(pu.x-px,pu.y-py);
      if (dist<p.magnetRange) {
        const dx=px-pu.x, dy=py-pu.y, len=Math.hypot(dx,dy)||1;
        pu.vx+=(dx/len)*0.8; pu.vy+=(dy/len)*0.8;
        const spd=Math.hypot(pu.vx,pu.vy); if(spd>8){pu.vx=pu.vx/spd*8;pu.vy=pu.vy/spd*8;}
      }
    }
  }
}

// ─── MAIN UPDATE ──────────────────────────────────────────────────────────────
function updateGame(st, inp) {
  st.frameCount++;
  if (st.phase!=="playing") return;
  processSpawnQueue(st);
  if (st.bossWarningTimer>0) st.bossWarningTimer--;
  if (st.screenShake>0) st.screenShake--;
  for (const star of st.stars) {
    star.y+=star.speed;
    if (star.y>st.canvasHeight) { star.y=-2; star.x=Math.random()*st.canvasWidth; }
  }
  updatePlayer(st,inp);
  for (const e of st.enemies) { if (e.active) updateEnemy(st,e); }
  const w=st.canvasWidth,h=st.canvasHeight;
  for (const b of st.playerBullets){b.x+=b.vx;b.y+=b.vy;if(b.y<-20||b.y>h+20||b.x<-20||b.x>w+20)b.active=false;}
  for (const b of st.enemyBullets){b.x+=b.vx;b.y+=b.vy;if(b.y>h+20||b.y<-20||b.x<-20||b.x>w+20)b.active=false;}
  for (const pu of st.powerUps){pu.x+=pu.vx;pu.y+=pu.vy;pu.animTimer++;
    if(pu.x<8)pu.vx=Math.abs(pu.vx);if(pu.x>w-POWERUP_SIZE-8)pu.vx=-Math.abs(pu.vx);
    if(pu.y>h+60)pu.active=false;}
  for (const p of st.particles){p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;
    if(p.type==="explosion"||p.type==="spark"){p.vy+=0.06;p.vx*=0.97;}
    if(p.type==="thruster"){p.vx*=0.9;p.vy*=0.88;}
    if(p.rotation!==undefined&&p.rotationSpeed!==undefined)p.rotation+=p.rotationSpeed;
    if(p.life<=0)p.active=false;}
  checkCollisions(st);
  if (st.comboTimer>0){st.comboTimer--;}else if(st.combo>0){st.combo=0;}
  if (st.player.laserBeam&&st.player.laserBeamTimer>0) applyLaserDamage(st);
  spawnThrusterParticles(st);
  st.enemies=st.enemies.filter(e=>e.active);
  st.playerBullets=st.playerBullets.filter(b=>b.active);
  st.enemyBullets=st.enemyBullets.filter(b=>b.active);
  st.particles=st.particles.filter(p=>p.active);
  st.powerUps=st.powerUps.filter(p=>p.active);
  if (st.enemies.length===0&&spawnQueue.length===0) {
    if (st.wave>=st.totalWaves){st.phase="victory";saveHighScore(st);}
    else{st.phase="waveClear";}
  }
  if (st.player.hp<=0) {
    st.player.hp=0; st.phase="gameOver";
    spawnExplosion(st,st.player.x+PLAYER_WIDTH/2,st.player.y+PLAYER_HEIGHT/2,"#a78bfa",60,3);
    st.screenShake=45; saveHighScore(st);
  }
}

// =============================================================================
// RENDERER (identical to original)
// =============================================================================
function drawBackground(ctx, w, h, frame) {
  const grad=ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,"#050510"); grad.addColorStop(0.5,"#080818"); grad.addColorStop(1,"#0a0520");
  ctx.fillStyle=grad; ctx.fillRect(0,0,w,h);
  drawNebula(ctx,w*0.2,h*0.3,180,"rgba(60,30,120,0.06)",frame);
  drawNebula(ctx,w*0.75,h*0.6,220,"rgba(20,60,120,0.05)",frame);
  drawNebula(ctx,w*0.5,h*0.15,150,"rgba(120,20,60,0.04)",frame);
}

function drawNebula(ctx, x, y, r, color, frame) {
  const pulse=1+Math.sin(frame*0.005)*0.06;
  const grad=ctx.createRadialGradient(x,y,0,x,y,r*pulse);
  grad.addColorStop(0,color); grad.addColorStop(1,"transparent");
  ctx.fillStyle=grad; ctx.beginPath();
  ctx.ellipse(x,y,r*1.8*pulse,r*pulse,0,0,Math.PI*2); ctx.fill();
}

function drawStars(ctx, st, frame) {
  for (const star of st.stars) {
    const twinkle=0.6+Math.sin(frame*0.05+star.twinkleOffset)*0.4;
    ctx.globalAlpha=star.opacity*twinkle;
    ctx.fillStyle=star.color;
    ctx.beginPath(); ctx.arc(star.x,star.y,star.size*0.5,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawPlayer(ctx, st, frame) {
  const p=st.player;
  if (p.invincibleTimer>0&&Math.floor(p.invincibleTimer/6)%2===0) return;
  const cx=p.x+p.width/2, cy=p.y+p.height/2;
  ctx.save(); ctx.translate(cx,cy);
  const glowR=30+Math.sin(frame*0.08)*4;
  const shipGlow=ctx.createRadialGradient(0,0,0,0,0,glowR);
  shipGlow.addColorStop(0,"rgba(124,58,237,0.3)"); shipGlow.addColorStop(1,"transparent");
  ctx.fillStyle=shipGlow; ctx.fillRect(-glowR,-glowR,glowR*2,glowR*2);
  if (p.shield>0) {
    const sa=0.2+(p.shield/p.maxShield)*0.35;
    const sg=ctx.createRadialGradient(0,0,15,0,0,38);
    sg.addColorStop(0,"rgba(59,130,246,0)"); sg.addColorStop(0.7,`rgba(59,130,246,${sa*0.5})`); sg.addColorStop(1,`rgba(96,165,250,${sa})`);
    ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(0,0,36+Math.sin(frame*0.15)*2,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=`rgba(96,165,250,${sa+0.2})`; ctx.lineWidth=1.5; ctx.stroke();
  }
  const hw=p.width/2, hh=p.height/2;
  ctx.fillStyle="#5b21b6";
  ctx.beginPath();
  ctx.moveTo(0,-hh); ctx.lineTo(hw*0.5,-hh*0.2); ctx.lineTo(hw*0.8,hh*0.5);
  ctx.lineTo(hw*0.3,hh*0.3); ctx.lineTo(0,hh); ctx.lineTo(-hw*0.3,hh*0.3);
  ctx.lineTo(-hw*0.8,hh*0.5); ctx.lineTo(-hw*0.5,-hh*0.2); ctx.closePath(); ctx.fill();
  ctx.strokeStyle="#a78bfa"; ctx.lineWidth=1.5; ctx.stroke();
  const cg=ctx.createRadialGradient(0,-hh*0.3,0,0,-hh*0.3,12);
  cg.addColorStop(0,"#ede9fe"); cg.addColorStop(0.5,"#7c3aed"); cg.addColorStop(1,"#4c1d95");
  ctx.fillStyle=cg; ctx.beginPath(); ctx.ellipse(0,-hh*0.2,7,10,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="#7c3aed";
  ctx.beginPath(); ctx.moveTo(-hw*0.4,hh*0.1); ctx.lineTo(-hw*1.05,hh*0.7); ctx.lineTo(-hw*0.6,hh*0.8); ctx.lineTo(-hw*0.3,hh*0.35); ctx.closePath(); ctx.fill();
  ctx.strokeStyle="#a78bfa"; ctx.lineWidth=1; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hw*0.4,hh*0.1); ctx.lineTo(hw*1.05,hh*0.7); ctx.lineTo(hw*0.6,hh*0.8); ctx.lineTo(hw*0.3,hh*0.35); ctx.closePath(); ctx.fill(); ctx.stroke();
  const ep=0.8+Math.sin(frame*0.25)*0.2;
  const eg=ctx.createLinearGradient(0,hh*0.7,0,hh*1.4);
  eg.addColorStop(0,`rgba(245,158,11,${ep*0.9})`); eg.addColorStop(0.5,`rgba(239,68,68,${ep*0.5})`); eg.addColorStop(1,"transparent");
  ctx.fillStyle=eg; ctx.beginPath(); ctx.ellipse(0,hh*0.9,8*ep,18*ep,0,0,Math.PI*2); ctx.fill();
  let piX=-50;
  if(p.spreadShot){ctx.fillStyle="#a78bfa";ctx.font="bold 9px monospace";ctx.fillText("SPR",piX,-hh-10);piX+=28;}
  if(p.rapidFire){ctx.fillStyle="#f59e0b";ctx.font="bold 9px monospace";ctx.fillText("RFR",piX,-hh-10);piX+=28;}
  if(p.laserBeam){ctx.fillStyle="#ef4444";ctx.font="bold 9px monospace";ctx.fillText("LSR",piX,-hh-10);piX+=28;}
  if(p.magnetRange>0){ctx.fillStyle="#06b6d4";ctx.font="bold 9px monospace";ctx.fillText("MGT",piX,-hh-10);}
  ctx.restore();
}

function drawLaserBeam(ctx, st, frame) {
  const p=st.player, lx=p.x+p.width/2, ly=p.y;
  const alpha=0.6+Math.sin(frame*0.3)*0.3, bw=8+Math.sin(frame*0.5)*3;
  ctx.save();
  const lg1=ctx.createLinearGradient(lx,0,lx+bw,0);
  lg1.addColorStop(0,`rgba(239,68,68,0)`); lg1.addColorStop(0.5,`rgba(239,68,68,${alpha*0.4})`); lg1.addColorStop(1,`rgba(239,68,68,0)`);
  ctx.fillStyle=lg1; ctx.fillRect(lx-bw*2,0,bw*4,ly);
  const lg2=ctx.createLinearGradient(lx-bw/2,0,lx+bw/2,0);
  lg2.addColorStop(0,`rgba(255,200,200,0)`); lg2.addColorStop(0.5,`rgba(255,255,255,${alpha})`); lg2.addColorStop(1,`rgba(255,200,200,0)`);
  ctx.fillStyle=lg2; ctx.fillRect(lx-bw/2,0,bw,ly);
  ctx.restore();
}

function drawEnemy(ctx, enemy, frame) {
  const cx=enemy.x+enemy.width/2, cy=enemy.y+enemy.height/2;
  const hw=enemy.width/2, hh=enemy.height/2;
  ctx.save(); ctx.translate(cx,cy);
  if (enemy.flashTimer>0){ctx.globalCompositeOperation="lighter";ctx.globalAlpha=enemy.flashTimer/8;}
  const gs=enemy.width*0.9*enemy.size;
  const gg=ctx.createRadialGradient(0,0,0,0,0,gs);
  gg.addColorStop(0,enemy.glowColor+"44"); gg.addColorStop(1,"transparent");
  ctx.fillStyle=gg; ctx.fillRect(-gs,-gs,gs*2,gs*2);
  if (enemy.flashTimer>0){ctx.globalCompositeOperation="source-over";ctx.globalAlpha=1;}
  ctx.fillStyle=enemy.flashTimer>0?"#ffffff":enemy.color;
  ctx.strokeStyle=enemy.glowColor; ctx.lineWidth=1.5;
  switch(enemy.type) {
    case "drone":    drawDroneShape(ctx,hw,hh,frame); break;
    case "zigzag":   drawZigzagShape(ctx,hw,hh); break;
    case "circle":   drawCircleShape(ctx,hw,hh,frame); break;
    case "tank":     drawTankShape(ctx,hw,hh); break;
    case "sniper":   drawSniperShape(ctx,hw,hh,frame); break;
    case "splitter": drawSplitterShape(ctx,hw,hh,frame); break;
    case "minion":   drawMinionShape(ctx,hw,hh); break;
    case "boss1":    drawBoss1Shape(ctx,hw,hh,frame,enemy.phase); break;
    case "boss2":    drawBoss2Shape(ctx,hw,hh,frame,enemy.phase); break;
    case "boss3":    drawBoss3Shape(ctx,hw,hh,frame,enemy.phase); break;
  }
  if (!["boss1","boss2","boss3"].includes(enemy.type)&&enemy.maxHp>0) {
    const bw=enemy.width, r=Math.max(0,enemy.hp/enemy.maxHp);
    ctx.fillStyle="#1f2937"; ctx.fillRect(-bw/2,hh+5,bw,3);
    ctx.fillStyle=r>0.5?"#22c55e":r>0.25?"#f59e0b":"#ef4444";
    ctx.fillRect(-bw/2,hh+5,bw*r,3);
  }
  ctx.restore();
}

function drawDroneShape(ctx,hw,hh,frame){
  ctx.beginPath();ctx.ellipse(0,0,hw,hh*0.55,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle="#fca5a5";ctx.beginPath();ctx.ellipse(0,-hh*0.15,hw*0.45,hh*0.3,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle="#ffffff44";ctx.lineWidth=1;ctx.save();ctx.rotate(frame*0.05);
  ctx.beginPath();ctx.arc(0,0,hw*0.85,0,Math.PI*1.3);ctx.stroke();ctx.restore();
}
function drawZigzagShape(ctx,hw,hh){
  ctx.beginPath();ctx.moveTo(0,-hh);ctx.lineTo(hw*0.7,0);ctx.lineTo(hw,hh);
  ctx.lineTo(0,hh*0.6);ctx.lineTo(-hw,hh);ctx.lineTo(-hw*0.7,0);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle="#fdba74";ctx.beginPath();ctx.arc(0,0,hw*0.3,0,Math.PI*2);ctx.fill();
}
function drawCircleShape(ctx,hw,hh,frame){
  ctx.save();ctx.rotate(frame*0.06);
  ctx.beginPath();
  for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;const r=hw*0.85;ctx[i===0?"moveTo":"lineTo"](Math.cos(a)*r,Math.sin(a)*r);}
  ctx.closePath();ctx.fill();ctx.stroke();ctx.restore();
  ctx.fillStyle="#fde047";ctx.beginPath();ctx.arc(0,0,hw*0.35,0,Math.PI*2);ctx.fill();
}
function drawTankShape(ctx,hw,hh){
  ctx.beginPath();ctx.roundRect(-hw,-hh*0.6,hw*2,hh*1.3,6);ctx.fill();ctx.stroke();
  ctx.strokeStyle="#4ade80";ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(-hw*0.5,-hh*0.6);ctx.lineTo(-hw*0.5,hh*0.7);ctx.moveTo(hw*0.5,-hh*0.6);ctx.lineTo(hw*0.5,hh*0.7);ctx.stroke();
  ctx.fillStyle="#4ade80";ctx.beginPath();ctx.arc(0,0,hw*0.3,0,Math.PI*2);ctx.fill();
}
function drawSniperShape(ctx,hw,hh,frame){
  ctx.beginPath();ctx.moveTo(0,-hh);ctx.lineTo(hw*0.4,-hh*0.2);ctx.lineTo(hw*0.3,hh);ctx.lineTo(-hw*0.3,hh);ctx.lineTo(-hw*0.4,-hh*0.2);ctx.closePath();ctx.fill();ctx.stroke();
  const pa=0.5+Math.sin(frame*0.15)*0.5;ctx.fillStyle=`rgba(249,168,212,${pa})`;
  ctx.beginPath();ctx.ellipse(0,-hh*1.1,3,8,0,0,Math.PI*2);ctx.fill();
}
function drawSplitterShape(ctx,hw,hh,frame){
  ctx.save();ctx.rotate(frame*0.02);
  ctx.beginPath();
  for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2-Math.PI/8;ctx[i===0?"moveTo":"lineTo"](Math.cos(a)*hw,Math.sin(a)*hh);}
  ctx.closePath();ctx.fill();ctx.stroke();ctx.restore();
  ctx.strokeStyle="#c4b5fd";ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-hw*0.5,0);ctx.lineTo(hw*0.5,0);ctx.moveTo(0,-hh*0.5);ctx.lineTo(0,hh*0.5);ctx.stroke();
}
function drawMinionShape(ctx,hw,hh){
  ctx.beginPath();ctx.moveTo(0,-hh);ctx.lineTo(hw,hh);ctx.lineTo(-hw,hh);ctx.closePath();ctx.fill();ctx.stroke();
}
function drawBoss1Shape(ctx,hw,hh,frame,phase){
  ctx.save();ctx.rotate(Math.sin(frame*0.01)*0.04);
  ctx.beginPath();ctx.moveTo(0,-hh);ctx.lineTo(hw*0.6,-hh*0.4);ctx.lineTo(hw,hh*0.3);
  ctx.lineTo(hw*0.4,hh);ctx.lineTo(-hw*0.4,hh);ctx.lineTo(-hw,hh*0.3);ctx.lineTo(-hw*0.6,-hh*0.4);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.strokeStyle=phase>=1?"#fca5a5":"#ef444477";ctx.lineWidth=2;
  for(let i=0;i<2;i++){
    ctx.save();ctx.rotate(frame*(0.04+i*0.02)*(i%2===0?1:-1));
    ctx.beginPath();ctx.arc(0,0,hw*(0.7+i*0.25),0,Math.PI*2);ctx.setLineDash([8,8]);ctx.stroke();ctx.setLineDash([]);
    for(let c=0;c<4;c++){const a=(c/4)*Math.PI*2;const r=hw*(0.7+i*0.25);ctx.fillStyle=phase>=2?"#ef4444":"#dc2626";ctx.beginPath();ctx.arc(Math.cos(a)*r,Math.sin(a)*r,5,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  }
  const cg=ctx.createRadialGradient(0,0,0,0,0,hw*0.3);cg.addColorStop(0,"#fff");cg.addColorStop(0.4,"#ef4444");cg.addColorStop(1,"#7f1d1d");
  ctx.fillStyle=cg;ctx.beginPath();ctx.arc(0,0,hw*0.3,0,Math.PI*2);ctx.fill();ctx.restore();
}
function drawBoss2Shape(ctx,hw,hh,frame,phase){
  ctx.save();ctx.rotate(Math.sin(frame*0.015)*0.05);
  ctx.beginPath();ctx.moveTo(0,-hh);ctx.bezierCurveTo(hw*0.8,-hh*0.5,hw*1.1,hh*0.5,hw*0.5,hh);
  ctx.lineTo(0,hh*0.6);ctx.lineTo(-hw*0.5,hh);ctx.bezierCurveTo(-hw*1.1,hh*0.5,-hw*0.8,-hh*0.5,0,-hh);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.strokeStyle=phase>=1?"#c4b5fd":"#7c3aed88";ctx.lineWidth=1.5;
  for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(i*hw*0.2,-hh*0.8);ctx.lineTo(i*hw*0.35,hh*0.8);ctx.stroke();}
  const ep=0.7+Math.sin(frame*0.1)*0.3;
  const eg=ctx.createRadialGradient(0,0,0,0,0,hw*0.3*ep);eg.addColorStop(0,"#fff");eg.addColorStop(0.3,"#a78bfa");eg.addColorStop(1,"#4c1d95");
  ctx.fillStyle=eg;ctx.beginPath();ctx.ellipse(0,0,hw*0.3*ep,hh*0.25*ep,0,0,Math.PI*2);ctx.fill();ctx.restore();
}
function drawBoss3Shape(ctx,hw,hh,frame,phase){
  ctx.save();
  ctx.save();ctx.rotate(frame*0.025);
  for(let i=0;i<12;i++){
    const a=(i/12)*Math.PI*2,r=hw*1.1,sl=12+Math.sin(frame*0.1+i)*4;
    ctx.fillStyle=i%3===0?"#0ea5e9":"#075985";ctx.beginPath();ctx.arc(Math.cos(a)*r,Math.sin(a)*r,6,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle="#38bdf8";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(Math.cos(a)*(r-6),Math.sin(a)*(r-6));ctx.lineTo(Math.cos(a)*(r+sl),Math.sin(a)*(r+sl));ctx.stroke();
  }ctx.restore();
  ctx.beginPath();
  for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2+frame*0.01;const r=hw*(0.7+Math.sin(frame*0.05+i)*0.1);ctx[i===0?"moveTo":"lineTo"](Math.cos(a)*r,Math.sin(a)*r);}
  ctx.closePath();ctx.fill();ctx.strokeStyle="#38bdf8";ctx.lineWidth=2;ctx.stroke();
  const cc=phase===0?"#0ea5e9":phase===1?"#7c3aed":"#ef4444";
  const cg2=phase===0?"#38bdf8":phase===1?"#a78bfa":"#fca5a5";
  const cp=0.8+Math.sin(frame*0.12)*0.2;
  const cgrad=ctx.createRadialGradient(0,0,0,0,0,hw*0.4*cp);cgrad.addColorStop(0,"#fff");cgrad.addColorStop(0.3,cg2);cgrad.addColorStop(1,cc);
  ctx.fillStyle=cgrad;ctx.beginPath();ctx.arc(0,0,hw*0.4*cp,0,Math.PI*2);ctx.fill();
  for(let i=0;i<3;i++){const a=(i/3)*Math.PI*2+frame*0.02;const ex=Math.cos(a)*hw*0.22;const ey=Math.sin(a)*hw*0.22;
    ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(ex,ey,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#000";ctx.beginPath();ctx.arc(ex+1,ey+1,2.5,0,Math.PI*2);ctx.fill();}
  ctx.restore();
}

function drawBullet(ctx, bullet) {
  ctx.save();
  const cx=bullet.x+bullet.width/2,cy=bullet.y+bullet.height/2;
  const glow=ctx.createRadialGradient(cx,cy,0,cx,cy,bullet.size*2);
  glow.addColorStop(0,bullet.glowColor+"80");glow.addColorStop(1,"transparent");
  ctx.fillStyle=glow;ctx.fillRect(cx-bullet.size*2,cy-bullet.size*2,bullet.size*4,bullet.size*4);
  ctx.fillStyle=bullet.color;ctx.beginPath();ctx.arc(cx,cy,bullet.size,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#ffffff";ctx.beginPath();ctx.arc(cx,cy,bullet.size*0.4,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawPowerUp(ctx, pu, frame) {
  const cx=pu.x+pu.width/2, cy=pu.y+pu.height/2+Math.sin(pu.animTimer*0.08)*5;
  const spin=frame*0.05;
  ctx.save();ctx.translate(cx,cy);ctx.rotate(spin);
  const gg=ctx.createRadialGradient(0,0,0,0,0,24);gg.addColorStop(0,pu.glowColor+"66");gg.addColorStop(1,"transparent");
  ctx.fillStyle=gg;ctx.fillRect(-24,-24,48,48);
  ctx.fillStyle=pu.color;ctx.strokeStyle=pu.glowColor;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,-12);ctx.lineTo(10,0);ctx.lineTo(0,12);ctx.lineTo(-10,0);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.rotate(-spin);ctx.fillStyle="#fff";ctx.font="bold 8px monospace";ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillText(pu.label,0,0);ctx.restore();
}

function drawParticle(ctx, p) {
  ctx.save();ctx.globalAlpha=Math.max(0,p.life);
  if (p.type==="score"){
    ctx.fillStyle=p.color;ctx.font=`bold ${p.size}px monospace`;ctx.textAlign="center";ctx.fillText(p.text??"",p.x,p.y);
  } else if (p.type==="explosion"||p.type==="spark"){
    ctx.translate(p.x,p.y);if(p.rotation!==undefined)ctx.rotate(p.rotation);
    ctx.fillStyle=p.color;const s=p.size*p.life;
    if(p.type==="spark"){ctx.fillRect(-s/2,-s/2,s,s);}else{ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.fill();}
  } else if (p.type==="thruster"){
    ctx.translate(p.x,p.y);const s=p.size*p.life;
    const tg=ctx.createRadialGradient(0,0,0,0,0,s);tg.addColorStop(0,p.color+"ff");tg.addColorStop(1,p.color+"00");
    ctx.fillStyle=tg;ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.fill();
  } else if (p.type==="pickup"){
    ctx.translate(p.x,p.y);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(0,0,p.size*p.life,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function drawHUD(ctx, st, w, h, frame) {
  const p=st.player, bx=16, bw=160, bh=14;
  ctx.fillStyle="#a78bfa";ctx.font="bold 11px monospace";ctx.textAlign="left";ctx.fillText("HP",bx,28);
  ctx.fillStyle="#1f2937";ctx.beginPath();ctx.roundRect(bx+22,16,bw,bh,4);ctx.fill();
  const hr=Math.max(0,p.hp/p.maxHp);
  ctx.fillStyle=hr>0.5?"#22c55e":hr>0.25?"#f59e0b":"#ef4444";
  ctx.beginPath();ctx.roundRect(bx+22,16,bw*hr,bh,4);ctx.fill();
  ctx.fillStyle="#fff";ctx.font="bold 9px monospace";ctx.fillText(`${Math.ceil(p.hp)}/${p.maxHp}`,bx+28,27);
  ctx.fillStyle="#a78bfa";ctx.font="bold 11px monospace";ctx.fillText("SH",bx,48);
  ctx.fillStyle="#1f2937";ctx.beginPath();ctx.roundRect(bx+22,36,bw,bh,4);ctx.fill();
  if(p.shield>0){
    const sr=p.shield/p.maxShield;
    const sg=ctx.createLinearGradient(bx+22,0,bx+22+bw,0);sg.addColorStop(0,"#3b82f6");sg.addColorStop(1,"#60a5fa");
    ctx.fillStyle=sg;ctx.beginPath();ctx.roundRect(bx+22,36,bw*sr,bh,4);ctx.fill();
  }
  ctx.fillStyle="#fff";ctx.font="bold 9px monospace";ctx.fillText(`${Math.ceil(p.shield)}/${p.maxShield}`,bx+28,47);
  ctx.textAlign="center";ctx.font="bold 20px monospace";
  const sg=ctx.createLinearGradient(w/2-80,0,w/2+80,0);sg.addColorStop(0,"#a78bfa");sg.addColorStop(0.5,"#fde68a");sg.addColorStop(1,"#a78bfa");
  ctx.fillStyle=sg;ctx.fillText(st.score.toLocaleString(),w/2,26);
  ctx.font="bold 11px monospace";ctx.fillStyle="#94a3b8";
  const wl=st.wave<WAVES.length?WAVES[st.wave-1]?.label??`Wave ${st.wave}`:`Wave ${st.wave}`;
  ctx.fillText(wl,w/2,44);
  if(st.combo>=2){
    const ca=Math.min(1,st.comboTimer/60);ctx.globalAlpha=ca;
    ctx.font=`bold ${14+Math.min(st.combo,20)}px monospace`;
    const cg=ctx.createLinearGradient(w/2-60,0,w/2+60,0);cg.addColorStop(0,"#f59e0b");cg.addColorStop(1,"#ef4444");
    ctx.fillStyle=cg;ctx.fillText(`${st.combo}x COMBO!`,w/2,64);ctx.globalAlpha=1;
  }
  ctx.textAlign="right";ctx.font="bold 11px monospace";ctx.fillStyle="#94a3b8";
  ctx.fillText(`ENEMIES: ${st.enemiesRemaining+st.enemies.length}`,w-16,26);
  let pux=16;const puy=h-36;
  function pill(label,color,timer,max){
    const r=timer/max;ctx.fillStyle="#1f2937cc";ctx.beginPath();ctx.roundRect(pux,puy,70,22,6);ctx.fill();
    ctx.fillStyle=color;ctx.beginPath();ctx.roundRect(pux,puy,70*r,22,6);ctx.fill();
    ctx.fillStyle="#fff";ctx.font="bold 9px monospace";ctx.textAlign="center";ctx.fillText(label,pux+35,puy+15);pux+=78;
  }
  if(p.spreadShot) pill("SPREAD","#a78bfa",p.spreadShotTimer,600);
  if(p.rapidFire)  pill("RAPID","#f59e0b",p.rapidFireTimer,600);
  if(p.laserBeam)  pill("LASER","#ef4444",p.laserBeamTimer,600);
  if(p.magnetRange>0) pill("MAGNET","#06b6d4",p.magnetTimer,600);
  if(st.bossWarningTimer>0){
    const pulse=Math.sin(frame*0.2)*0.5+0.5;ctx.globalAlpha=pulse;
    ctx.fillStyle="#ef4444";ctx.font="bold 28px monospace";ctx.textAlign="center";
    ctx.fillText("⚠ BOSS INCOMING ⚠",w/2,h/2-40);ctx.globalAlpha=1;
  }
  ctx.textAlign="left";
}

function drawBossHpBar(ctx, enemy, w, h) {
  const bx=40,by=h-28,bw=w-80,bh=16,r=Math.max(0,enemy.hp/enemy.maxHp);
  ctx.fillStyle="#1f2937";ctx.beginPath();ctx.roundRect(bx,by,bw,bh,6);ctx.fill();
  const bg=ctx.createLinearGradient(bx,0,bx+bw,0);bg.addColorStop(0,enemy.color);bg.addColorStop(0.5,enemy.glowColor);bg.addColorStop(1,enemy.color);
  ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(bx,by,bw*r,bh,6);ctx.fill();
  ctx.fillStyle="#fff";ctx.font="bold 10px monospace";ctx.textAlign="center";
  ctx.fillText(`${enemy.type.toUpperCase()} — ${Math.ceil(enemy.hp)} / ${enemy.maxHp}`,w/2,by+12);
}

function renderMenu(ctx, st, frame) {
  const w=st.canvasWidth,h=st.canvasHeight;
  drawBackground(ctx,w,h,frame);drawStars(ctx,st,frame);
  ctx.save();ctx.translate(w/2,h/2-60);
  for(let i=0;i<3;i++){
    ctx.save();ctx.rotate(frame*(0.006+i*0.004)*(i%2===0?1:-1));
    ctx.strokeStyle=["#a78bfa44","#60a5fa44","#fde68a44"][i];ctx.lineWidth=1.5;ctx.setLineDash([6,6]);
    ctx.beginPath();ctx.arc(0,0,70+i*28,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.restore();
  }ctx.restore();
  ctx.textAlign="center";
  const tp=1+Math.sin(frame*0.06)*0.015;
  ctx.save();ctx.translate(w/2,110);ctx.scale(tp,tp);
  ctx.font="bold 44px monospace";
  const tg=ctx.createLinearGradient(-180,0,180,0);tg.addColorStop(0,"#a78bfa");tg.addColorStop(0.4,"#fde68a");tg.addColorStop(0.7,"#60a5fa");tg.addColorStop(1,"#a78bfa");
  ctx.fillStyle=tg;ctx.fillText("DZ SPACE",0,0);
  ctx.font="bold 36px monospace";ctx.fillStyle="#e2e8f0";ctx.fillText("SHOOTER",0,48);ctx.restore();

  const cy=h/2+10;ctx.font="bold 13px monospace";ctx.fillStyle="#94a3b8";
  const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
  const hints = isMobile
    ? ["Touch & drag — Move your ship","Release drag to glide","2-finger touch — Shoot","Tap once — Fire single shot"]
    : ["WASD / Arrow Keys — Move","SPACE / Click — Shoot","P / ESC — Pause","Collect gems for power-ups!"];
  hints.forEach((t,i)=>ctx.fillText(t,w/2,cy+i*26));
  const sp=Math.sin(frame*0.08)*0.5+0.5;ctx.font="bold 22px monospace";
  const sg=ctx.createLinearGradient(w/2-120,0,w/2+120,0);sg.addColorStop(0,`rgba(167,139,250,${sp})`);sg.addColorStop(0.5,`rgba(253,230,138,${sp})`);sg.addColorStop(1,`rgba(167,139,250,${sp})`);
  ctx.fillStyle=sg;ctx.fillText("▶ TAP OR PRESS ENTER TO START",w/2,h-80);
  if(st.highScores.length>0){
    ctx.font="bold 11px monospace";ctx.fillStyle="#475569";ctx.fillText("HIGH SCORES",w/2,h-56);
    for(let i=0;i<Math.min(3,st.highScores.length);i++){
      const s=st.highScores[i];ctx.fillStyle=["#fde68a","#94a3b8","#b45309"][i];
      ctx.fillText(`${i+1}. ${s.score.toLocaleString()} — Wave ${s.wave}`,w/2,h-40+i*16);
    }
  }
}

function renderGameOver(ctx, st, frame) {
  const w=st.canvasWidth,h=st.canvasHeight;
  drawBackground(ctx,w,h,frame);drawStars(ctx,st,frame);
  ctx.fillStyle="rgba(239,68,68,0.08)";ctx.fillRect(0,0,w,h);
  ctx.textAlign="center";ctx.font="bold 52px monospace";
  const gg=ctx.createLinearGradient(w/2-150,0,w/2+150,0);gg.addColorStop(0,"#ef4444");gg.addColorStop(0.5,"#fca5a5");gg.addColorStop(1,"#ef4444");
  ctx.fillStyle=gg;ctx.fillText("GAME OVER",w/2,h/2-100);
  ctx.font="bold 16px monospace";ctx.fillStyle="#94a3b8";
  ctx.fillText(`Final Score: ${st.score.toLocaleString()}`,w/2,h/2-50);
  ctx.fillText(`Wave Reached: ${st.wave} / ${st.totalWaves}`,w/2,h/2-22);
  ctx.fillText(`Max Combo: ${st.maxCombo}x`,w/2,h/2+6);
  const sp=Math.sin(frame*0.08)*0.5+0.5;ctx.font="bold 18px monospace";
  ctx.fillStyle=`rgba(167,139,250,${0.5+sp*0.5})`;ctx.fillText("Tap or press ENTER to play again",w/2,h/2+60);
}

function renderVictory(ctx, st, frame) {
  const w=st.canvasWidth,h=st.canvasHeight;
  drawBackground(ctx,w,h,frame);drawStars(ctx,st,frame);
  ctx.textAlign="center";const p=1+Math.sin(frame*0.08)*0.02;
  ctx.save();ctx.translate(w/2,h/2-110);ctx.scale(p,p);ctx.font="bold 48px monospace";
  const vg=ctx.createLinearGradient(-180,0,180,0);vg.addColorStop(0,"#fde68a");vg.addColorStop(0.4,"#a78bfa");vg.addColorStop(0.8,"#60a5fa");vg.addColorStop(1,"#fde68a");
  ctx.fillStyle=vg;ctx.fillText("VICTORY!",0,0);ctx.restore();
  ctx.font="bold 18px monospace";ctx.fillStyle="#fde68a";ctx.fillText("You conquer the cosmos!",w/2,h/2-55);
  ctx.fillStyle="#94a3b8";ctx.font="bold 15px monospace";
  ctx.fillText(`Final Score: ${st.score.toLocaleString()}`,w/2,h/2-20);ctx.fillText(`Max Combo: ${st.maxCombo}x`,w/2,h/2+6);
  const sp=Math.sin(frame*0.08)*0.5+0.5;ctx.font="bold 18px monospace";
  ctx.fillStyle=`rgba(253,230,138,${0.5+sp*0.5})`;ctx.fillText("Tap or press ENTER to play again",w/2,h/2+60);
}

function render(ctx, st) {
  const w=st.canvasWidth,h=st.canvasHeight,frame=st.frameCount;
  if(st.phase==="menu"){renderMenu(ctx,st,frame);return;}
  if(st.phase==="gameOver"){renderGameOver(ctx,st,frame);for(const p of st.particles){if(p.active)drawParticle(ctx,p);}return;}
  if(st.phase==="victory"){renderVictory(ctx,st,frame);for(const p of st.particles){if(p.active)drawParticle(ctx,p);}return;}
  ctx.save();
  if(st.screenShake>0){const s=Math.min(st.screenShake*0.5,12);ctx.translate((Math.random()-0.5)*s,(Math.random()-0.5)*s);}
  drawBackground(ctx,w,h,frame);drawStars(ctx,st,frame);
  if(st.phase==="playing"&&st.player.laserBeam&&st.player.laserBeamTimer>0) drawLaserBeam(ctx,st,frame);
  for(const pu of st.powerUps){if(pu.active)drawPowerUp(ctx,pu,frame);}
  for(const e of st.enemies){
    if(!e.active)continue;drawEnemy(ctx,e,frame);
    if(["boss1","boss2","boss3"].includes(e.type))drawBossHpBar(ctx,e,w,h);
  }
  for(const b of st.playerBullets){if(b.active)drawBullet(ctx,b);}
  for(const b of st.enemyBullets){if(b.active)drawBullet(ctx,b);}
  if(st.phase!=="gameOver") drawPlayer(ctx,st,frame);
  for(const p of st.particles){if(p.active)drawParticle(ctx,p);}
  ctx.restore();
  if(st.phase==="playing"||st.phase==="paused") drawHUD(ctx,st,w,h,frame);
  if(st.phase==="waveClear"){
    ctx.fillStyle="rgba(0,0,0,0.35)";ctx.fillRect(0,0,w,h);
    const pulse=Math.sin(frame*0.1)*0.2+1;
    ctx.save();ctx.translate(w/2,h/2-40);ctx.scale(pulse,pulse);ctx.font="bold 42px monospace";ctx.textAlign="center";
    const wg=ctx.createLinearGradient(-100,0,100,0);wg.addColorStop(0,"#fde68a");wg.addColorStop(0.5,"#a78bfa");wg.addColorStop(1,"#60a5fa");
    ctx.fillStyle=wg;ctx.fillText("WAVE CLEAR!",0,0);ctx.restore();
    ctx.font="bold 18px monospace";ctx.fillStyle="#94a3b8";ctx.textAlign="center";
    ctx.fillText(`Score: ${st.score.toLocaleString()}`,w/2,h/2+20);ctx.fillText(`Max Combo: ${st.maxCombo}x`,w/2,h/2+45);
    ctx.font="bold 14px monospace";ctx.fillStyle="#a78bfa";ctx.fillText("Tap or press ENTER to continue →",w/2,h/2+85);
  }
  if(st.phase==="bossEntry"){
    const pulse=Math.sin(frame*0.15)*0.5+0.5;
    ctx.fillStyle=`rgba(239,68,68,${pulse*0.12})`;ctx.fillRect(0,0,w,h);
    ctx.font="bold 36px monospace";ctx.textAlign="center";ctx.fillStyle=`rgba(239,68,68,${0.7+pulse*0.3})`;
    ctx.fillText("⚠ BOSS APPROACHING ⚠",w/2,h/2);
    const wl=st.wave<WAVES.length?WAVES[st.wave-1]?.label??"":"";
    ctx.font="bold 18px monospace";ctx.fillStyle="#fff";ctx.fillText(wl,w/2,h/2+40);
  }
  if(st.phase==="paused"){
    ctx.fillStyle="rgba(0,0,0,0.55)";ctx.fillRect(0,0,w,h);
    ctx.font="bold 40px monospace";ctx.textAlign="center";ctx.fillStyle="#a78bfa";ctx.fillText("PAUSED",w/2,h/2-20);
    ctx.font="bold 16px monospace";ctx.fillStyle="#94a3b8";ctx.fillText("Tap twice quickly to resume",w/2,h/2+20);
  }
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  if (state) { state.canvasWidth=canvas.width; state.canvasHeight=canvas.height; }
}
window.addEventListener("resize", resize);
resize();

function handleStart() {
  if (state.phase==="menu") { state.wave=1; startNextWave(state); }
  else if (state.phase==="waveClear") { state.wave++; startNextWave(state); }
  else if (state.phase==="gameOver"||state.phase==="victory") {
    const hs=state.highScores;
    state=createInitialState(canvas.width,canvas.height);
    state.highScores=hs; state.wave=1; startNextWave(state);
  }
}

// ─── KEYBOARD ────────────────────────────────────────────────────────────────
window.addEventListener("keydown", e => {
  switch(e.code) {
    case "ArrowLeft": case "KeyA":  input.left=true;  break;
    case "ArrowRight":case "KeyD":  input.right=true; break;
    case "ArrowUp":   case "KeyW":  input.up=true;    break;
    case "ArrowDown": case "KeyS":  input.down=true;  break;
    case "Space":                    input.shoot=true; e.preventDefault(); break;
    case "KeyP": case "Escape":
      if(state.phase==="playing") state.phase="paused";
      else if(state.phase==="paused") state.phase="playing";
      break;
    case "Enter": handleStart(); break;
  }
});
window.addEventListener("keyup", e => {
  switch(e.code) {
    case "ArrowLeft": case "KeyA":  input.left=false;  break;
    case "ArrowRight":case "KeyD":  input.right=false; break;
    case "ArrowUp":   case "KeyW":  input.up=false;    break;
    case "ArrowDown": case "KeyS":  input.down=false;  break;
    case "Space":                    input.shoot=false; break;
  }
});

// ─── MOUSE ───────────────────────────────────────────────────────────────────
canvas.addEventListener("mousedown", e => {
  if (e.button===0) { input.mouseShoot=true; handleStart(); }
});
canvas.addEventListener("mouseup", e => { if(e.button===0) input.mouseShoot=false; });
canvas.addEventListener("mousemove", e => {
  const r=canvas.getBoundingClientRect(); input.mouseX=e.clientX-r.left; input.mouseY=e.clientY-r.top;
});

// ─── TOUCH — invisible steering + tap-to-shoot ────────────────────────────────
// Logic:
//   • 1 finger down  → start tracking; record start position
//   • 1 finger move  → if moved > TOUCH_MOVE_THRESHOLD → isDrag=true; ship follows finger
//   • 1 finger up    → if NOT isDrag → shootPending (tap shot); reset touch
//   • 2+ fingers     → multiTouch=true → continuous shooting while steering
//   • Non-playing screens → calls handleStart() on touchstart

let lastTapTime = 0; // for double-tap pause toggle

canvas.addEventListener("touchstart", e => {
  e.preventDefault();

  // Non-playing phases: any tap starts/continues
  if (state.phase !== "playing") {
    // Double-tap to un-pause
    if (state.phase === "paused") {
      const now = Date.now();
      if (now - lastTapTime < 300) { state.phase = "playing"; }
      lastTapTime = now;
      return;
    }
    handleStart();
    return;
  }

  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;

  if (e.touches.length >= 2) {
    touch.multiTouch = true;
  }

  // Primary steering touch — use first touch
  const t = e.touches[0];
  const cx = (t.clientX - rect.left) * scaleX;
  const cy = (t.clientY - rect.top)  * scaleY;

  if (!touch.active) {
    touch.active   = true;
    touch.id       = t.identifier;
    touch.startX   = cx;
    touch.startY   = cy;
    touch.currentX = cx;
    touch.currentY = cy;
    touch.isDrag   = false;
    // Initialize target to current ship center so ship doesn't jump
    touch.targetX  = state.player.x + state.player.width  / 2;
    touch.targetY  = state.player.y + state.player.height / 2;
  }
}, { passive: false });

canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  if (state.phase !== "playing") return;

  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;

  // Find our primary touch
  for (let i = 0; i < e.changedTouches.length; i++) {
    const t = e.changedTouches[i];
    if (t.identifier === touch.id || !touch.active) {
      const cx = (t.clientX - rect.left) * scaleX;
      const cy = (t.clientY - rect.top)  * scaleY;
      const dx = cx - touch.startX;
      const dy = cy - touch.startY;

      if (!touch.isDrag && Math.hypot(dx, dy) > TOUCH_MOVE_THRESHOLD) {
        touch.isDrag = true;
      }

      if (touch.isDrag) {
        // Move target alongside finger delta from last position
        const moveDx = cx - touch.currentX;
        const moveDy = cy - touch.currentY;
        touch.targetX += moveDx;
        touch.targetY += moveDy;
        // Clamp target to canvas bounds (accounting for ship size)
        const p = state.player;
        touch.targetX = Math.max(p.width/2 + 4, Math.min(canvas.width  - p.width/2  - 4, touch.targetX));
        touch.targetY = Math.max(p.height/2 + 4, Math.min(canvas.height - p.height/2 - 4, touch.targetY));
      }

      touch.currentX = cx;
      touch.currentY = cy;
      break;
    }
  }
}, { passive: false });

canvas.addEventListener("touchend", e => {
  e.preventDefault();
  if (state.phase !== "playing") return;

  // Check if our primary touch lifted
  for (let i = 0; i < e.changedTouches.length; i++) {
    const t = e.changedTouches[i];
    if (t.identifier === touch.id) {
      if (!touch.isDrag) {
        // It was a tap — fire a single shot
        touch.shootPending = true;
      }
      touch.active   = false;
      touch.id       = null;
      touch.isDrag   = false;
      break;
    }
  }

  // Update multi-touch state
  if (e.touches.length < 2) {
    touch.multiTouch = false;
  }
  if (e.touches.length === 0) {
    touch.active = false;
    touch.id     = null;
    touch.isDrag = false;
    touch.multiTouch = false;
  }
}, { passive: false });

canvas.addEventListener("touchcancel", e => {
  e.preventDefault();
  touch.active     = false;
  touch.id         = null;
  touch.isDrag     = false;
  touch.multiTouch = false;
}, { passive: false });

function loop() {
  updateGame(state, input);
  render(ctx, state);
  animFrame = requestAnimationFrame(loop);
}

// Start
state = createInitialState(canvas.width, canvas.height);
input = createInput();
loop();
</script>
</body>
